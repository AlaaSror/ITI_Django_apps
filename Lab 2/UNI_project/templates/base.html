<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}University System{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        /* ── Navbar ── */
        nav {
            background: #1a237e;
            padding: 0 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        nav .brand {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 18px 0;
            margin-right: auto;
            letter-spacing: 1px;
        }

        nav a {
            color: #c5cae9;
            text-decoration: none;
            padding: 20px 20px;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
            border-bottom: 3px solid transparent;
        }

        nav a:hover, nav a.active {
            color: #fff;
            border-bottom: 3px solid #7986cb;
            background: rgba(255,255,255,0.07);
        }

        /* ── Page container ── */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 24px;
        }

        h1 {
            font-size: 1.8rem;
            color: #1a237e;
            margin-bottom: 24px;
            border-left: 5px solid #3f51b5;
            padding-left: 14px;
        }

        /* ── Cards grid ── */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 22px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.18s, box-shadow 0.18s;
            border-top: 4px solid #3f51b5;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.13);
        }

        .card h2 {
            font-size: 1.15rem;
            color: #1a237e;
            margin-bottom: 8px;
        }

        .card p {
            color: #666;
            font-size: 0.92rem;
            margin-bottom: 4px;
        }

        .card a {
            display: inline-block;
            margin-top: 12px;
            padding: 7px 18px;
            background: #3f51b5;
            color: #fff;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.88rem;
            transition: background 0.2s;
        }

        .card a:hover { background: #283593; }

        /* ── Detail page ── */
        .detail-box {
            background: #fff;
            border-radius: 10px;
            padding: 30px 34px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 28px;
        }

        .detail-box h2 {
            color: #1a237e;
            font-size: 1.4rem;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8eaf6;
        }

        .info-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.97rem;
        }

        .info-row .label {
            font-weight: 600;
            color: #3f51b5;
            min-width: 110px;
        }

        /* ── Tables ── */
        .section-title {
            font-size: 1.1rem;
            color: #1a237e;
            font-weight: 600;
            margin: 24px 0 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 5px rgba(0,0,0,0.07);
        }

        th {
            background: #3f51b5;
            color: #fff;
            padding: 11px 16px;
            text-align: left;
            font-size: 0.9rem;
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f2f5;
            font-size: 0.92rem;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f5f5ff; }

        td a {
            color: #3f51b5;
            text-decoration: none;
            font-weight: 500;
        }

        td a:hover { text-decoration: underline; }

        /* ── Empty state ── */
        .empty {
            color: #999;
            font-style: italic;
            padding: 12px 0;
        }

        /* ── Back link ── */
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #3f51b5;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .back-link:hover { text-decoration: underline; }

        /* ── Badge ── */
        .badge {
            display: inline-block;
            background: #e8eaf6;
            color: #3f51b5;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 0.82rem;
            font-weight: 600;
            margin-left: 6px;
        }
    </style>
</head>
<body>

<nav>
    <span class="brand">🎓 UNI System</span>
    <a href="/instructor/" class="{% block nav_instructor %}{% endblock %}">Instructors</a>
    <a href="/courses/"   class="{% block nav_courses %}{% endblock %}">Courses</a>
    <a href="/students/"  class="{% block nav_students %}{% endblock %}">Students</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
